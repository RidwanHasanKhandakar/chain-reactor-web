<!DOCTYPE html>
<html>
<head>
    <title>Chain Reaction WEB</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>

    <div class="app">
        <header class="topbar">
            <div class="brand" aria-label="Chain Reaction">
                <div class="brand__row">
                    <svg class="brand__logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                        <defs>
                            <linearGradient id="crg" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0" stop-color="#9AE6FF"/>
                                <stop offset="0.55" stop-color="#5A78FF"/>
                                <stop offset="1" stop-color="#B46BFF"/>
                            </linearGradient>
                        </defs>
                        <circle cx="18" cy="32" r="7.5" fill="url(#crg)" opacity="0.95"/>
                        <circle cx="32" cy="18" r="7.5" fill="url(#crg)" opacity="0.95"/>
                        <circle cx="46" cy="32" r="7.5" fill="url(#crg)" opacity="0.95"/>
                        <circle cx="32" cy="46" r="7.5" fill="url(#crg)" opacity="0.95"/>
                        <path d="M23.5 32 L28.5 22.5 M35.5 22.5 L40.5 32 M40.5 32 L35.5 41.5 M28.5 41.5 L23.5 32" stroke="rgba(234,240,255,0.85)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="32" cy="32" r="6.5" fill="rgba(255,255,255,0.10)" stroke="rgba(234,240,255,0.55)" stroke-width="2"/>
                    </svg>

                    <div class="brand__stack">
                        <div class="brand__title">
                            Chain <span class="brand__titleAccent">Reactor</span>
                            <span class="brand__badge" aria-label="Web app badge">WEB</span>
                        </div>
                        <div class="brand__subtitle">Play the classic chain reaction game</div>
                    </div>
                </div>
            </div>

            <div class="topbar__actions">
                <button id="themeToggle" class="btn btn--ghost" type="button" aria-label="Toggle theme">Theme</button>
                <button id="restartBtn" class="btn btn--ghost" type="button" style="display:none;">Restart</button>
                <button id="newGameBtn" class="btn btn--primary" type="button">New Game</button>
            </div>
        </header>

        <main class="layout">
            <aside class="panel">
                <div class="panel__section">
                    <div class="panel__label">Current turn</div>
                    <h2 id="turn" class="turn" style="display:none;"></h2>
                </div>

                <div class="panel__section">
                    <div class="panel__label">Players</div>
                    <div id="playersList" class="playersList"></div>
                </div>

                <div class="panel__section panel__section--hint">
                    <div class="hint">
                        Place orbs in empty cells or your own color. Cells explode when they reach capacity and spread to neighbors.
                    </div>
                </div>
            </aside>

            <section class="stage">
                <div id="gameContainer" class="gameContainer" style="display:none;">
                    <div id="board" class="board"></div>
                </div>
            </section>
        </main>

        <!-- SETUP MODAL -->
        <div id="setup" class="modal">
            <div class="modal__backdrop"></div>
            <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="setupTitle">
                <div class="modal__header">
                    <div id="setupTitle" class="modal__title">New game</div>
                    <div class="modal__subtitle">Configure players, then start.</div>
                </div>

                <div class="formRow">
                    <label class="label" for="playerCount">Number of players</label>
                    <select id="playerCount" class="select">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div id="names" class="names"></div>

                <div class="modal__actions">
                    <button class="btn btn--primary" onclick="startGame()" type="button">Start Game</button>
                </div>
            </div>
        </div>

        <!-- GAME OVER MODAL -->
        <div id="gameOver" class="modal" style="display:none;">
            <div class="modal__backdrop"></div>
            <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
                <div class="modal__header">
                    <div id="gameOverTitle" class="modal__title">Game over</div>
                    <div id="gameOverSubtitle" class="modal__subtitle"></div>
                </div>

                <div class="stats">
                    <div class="stats__grid" id="statsGrid"></div>
                </div>

                <div class="modal__actions">
                    <button id="playAgainBtn" class="btn btn--primary" type="button">Play again</button>
                    <button id="closeGameOverBtn" class="btn btn--ghost" type="button">Close</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer__inner">
            <div class="footer__credits">
                <span class="footer__label">Made by</span>
                <span id="authorName" class="footer__author">Ridwan Rahin</span>
            </div>

            <a
                class="footer__social"
                href="https://www.instagram.com/ridwan_rahin/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Open Instagram profile"
            >
                Instagram
            </a>
        </div>
    </footer>

    <script src="game.js"></script>
    <script src="main.js"></script>

</body>
</html>
